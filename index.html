<!DOCTYPE html>
<html lang="en">

<title>NCAA Tournament Snake Draft 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#e8e6e3;font-family:'Bebas Neue','Oswald',sans-serif;min-height:100vh;}
.grain{position:fixed;inset:0;opacity:0.03;pointer-events:none;z-index:100;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
header{background:linear-gradient(135deg,#0d0d14,#1a1a2e);border-bottom:3px solid #e94560;padding:20px 24px;position:relative;}
.rainbow{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e94560,#48cae4,#ffd166,#52b788);}
.hdr{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.sub{font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:#e94560;letter-spacing:4px;text-transform:uppercase;}
h1{font-size:clamp(24px,4vw,42px);letter-spacing:3px;background:linear-gradient(90deg,#fff 60%,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
main{max-width:1200px;margin:0 auto;padding:24px 16px;}
.nb{padding:8px 16px;border:1px solid #333;background:transparent;color:#777;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}
.nb.act{border-color:#e94560;background:#e94560;color:#fff;}
.nb.dng{color:#e94560;border-color:#e9456044;}
input[type=text],input[type=password],textarea{background:#111;border:1px solid #333;color:#e8e6e3;font-family:'Barlow',sans-serif;outline:none;box-sizing:border-box;}
.live{display:flex;align-items:center;gap:6px;margin-right:12px;font-family:'Barlow',sans-serif;font-size:11px;color:#52b788;}
.ldot{width:6px;height:6px;border-radius:50%;background:#52b788;box-shadow:0 0 8px #52b788;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center;}
.mdl{background:#1a1a2e;border:1px solid #e94560;padding:32px;max-width:400px;text-align:center;}
footer{border-top:1px solid rgba(255,255,255,0.06);padding:20px 24px;text-align:center;font-family:'Barlow',sans-serif;font-size:12px;color:#333;}
.tb{padding:12px;background:#111;cursor:pointer;text-align:left;transition:all 0.15s;border:1px solid rgba(255,255,255,0.05);}
.tb:hover{background:#1a1a1a;}
.pc{cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.pc:hover{transform:translateY(-2px);}
table{width:100%;border-collapse:collapse;font-family:'Barlow',sans-serif;}
th{padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#555;border-bottom:2px solid rgba(255,255,255,0.1);text-align:center;white-space:nowrap;}
td{padding:8px 12px;font-size:13px;}
.wb{width:28px;height:24px;border:1px solid #333;background:transparent;color:#555;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.wb.wa{border-color:#52b788;background:#52b78833;color:#52b788;}
.wb.la{border-color:#e94560;background:#e9456033;color:#e94560;}
.rb{padding:6px 14px;border:1px solid #333;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;}
</style>
</head>
<body>
<div class="grain"></div>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA_P6wBvkgcrsrs5Z5KCvi27YryFeMBdbw",
  authDomain:"ncaa-draft-2026-a8aa7.firebaseapp.com",
  databaseURL:"https://ncaa-draft-2026-a8aa7-default-rtdb.firebaseio.com",
  projectId:"ncaa-draft-2026-a8aa7",
  storageBucket:"ncaa-draft-2026-a8aa7.firebasestorage.app",
  messagingSenderId:"582803729241",
  appId:"1:582803729241:web:fa5fc0eecb62c7e83ffa48"
});
const db=firebase.database();
const ADMIN_CODE="MADNESS2026";
const BRACKET={
  East:[{s:1,n:"Duke"},{s:16,n:"Siena"},{s:8,n:"Ohio State"},{s:9,n:"TCU"},{s:5,n:"St. John's"},{s:12,n:"Northern Iowa"},{s:4,n:"Kansas"},{s:13,n:"Cal Baptist"},{s:6,n:"Louisville"},{s:11,n:"South Florida"},{s:3,n:"Michigan State"},{s:14,n:"North Dakota St"},{s:7,n:"UCLA"},{s:10,n:"UCF"},{s:2,n:"UConn"},{s:15,n:"Furman"}],
  West:[{s:1,n:"Arizona"},{s:16,n:"LIU"},{s:8,n:"Villanova"},{s:9,n:"Utah State"},{s:5,n:"Wisconsin"},{s:12,n:"High Point"},{s:4,n:"Arkansas"},{s:13,n:"Hawai'i"},{s:6,n:"BYU"},{s:11,n:"Miami (OH) / SMU"},{s:3,n:"Gonzaga"},{s:14,n:"Kennesaw State"},{s:7,n:"Miami (FL)"},{s:10,n:"Missouri"},{s:2,n:"Purdue"},{s:15,n:"Queens"}],
  Midwest:[{s:1,n:"Michigan"},{s:16,n:"Howard / UMBC"},{s:8,n:"Georgia"},{s:9,n:"Saint Louis"},{s:5,n:"Vanderbilt"},{s:12,n:"McNeese"},{s:4,n:"Alabama"},{s:13,n:"Hofstra"},{s:6,n:"Tennessee"},{s:11,n:"Texas / NC State"},{s:3,n:"Virginia"},{s:14,n:"Wright State"},{s:7,n:"Kentucky"},{s:10,n:"Santa Clara"},{s:2,n:"Iowa State"},{s:15,n:"Tennessee State"}],
  South:[{s:1,n:"Florida"},{s:16,n:"PV A&M / Lehigh"},{s:8,n:"Clemson"},{s:9,n:"Iowa"},{s:5,n:"Texas Tech"},{s:12,n:"Akron"},{s:4,n:"Nebraska"},{s:13,n:"Troy"},{s:6,n:"North Carolina"},{s:11,n:"VCU"},{s:3,n:"Illinois"},{s:14,n:"Penn"},{s:7,n:"Saint Mary's"},{s:10,n:"Texas A&M"},{s:2,n:"Houston"},{s:15,n:"Idaho"}]
};
const T=[];for(const[r,ts]of Object.entries(BRACKET))for(const t of ts)T.push({seed:t.s,name:t.n,region:r});
const RN=["R64","R32","Sweet 16","Elite 8","Final 4","Championship"],RP=[1,1,1,1,1,1];
const RC={East:"#e94560",West:"#48cae4",Midwest:"#ffd166",South:"#52b788"};
const PP=[{b:"#1a1a2e",a:"#e94560"},{b:"#0d1b2a",a:"#48cae4"},{b:"#1b2e1a",a:"#52b788"},{b:"#2e1a1a",a:"#f4845f"},{b:"#2e2a1a",a:"#ffd166"},{b:"#1a1a2e",a:"#7b68ee"},{b:"#2e1a2a",a:"#e07aff"},{b:"#1a2e2e",a:"#00bfa5"},{b:"#2e2020",a:"#ff6b9d"},{b:"#1a2020",a:"#20c997"}];

let S={ph:"loading",pl:[],pk:[],rs:{},sr:"",vw:"standings",sp:null,fr:"All",sn:"John\nTony\nGriff\nRoss\nLito\nPat\nAndrew\nJordan",sf:null,sg:false,mr:false,rc:"",re:false};
function ss(u){Object.assign(S,u);render();}

db.ref("draft").on("value",snap=>{
  const d=snap.val();
  if(d&&d.players&&d.players.length>0){
    ss({pl:d.players,pk:d.picks||[],ph:(d.picks&&d.picks.length>=T.length)?"tracker":"draft"});
  }else{ss({ph:"setup",pl:[],pk:[]});}
});
db.ref("results").on("value",snap=>{const d=snap.val();if(d)ss({rs:d});});

function gpp(i,p){const n=p.length,r=Math.floor(i/n),pos=i%n;return p[r%2===0?pos:n-1-pos];}
function gtp(t){const r=S.rs[t]||[];let p=0;r.forEach((v,i)=>{if(v==="Y")p+=RP[i];});return p;}
function gpd(nm){
  const teams=S.pk.filter(p=>p.player===nm);let pts=0,w=0,al=0,br=-1,bt=null;
  teams.forEach(({team})=>{const r=S.rs[team]||[];r.forEach((v,i)=>{if(v==="Y"){pts+=RP[i];w++;}});
    const lw=r.lastIndexOf("Y");if(lw>br){br=lw;bt=team;}
    if(!r.includes("N")&&r.filter(v=>v==="Y").length<6)al++;});
  return{teams,pts,w,al,br,bt};
}
function gst(){return S.pl.map((nm,i)=>({nm,c:PP[i%PP.length],...gpd(nm)})).sort((a,b)=>b.pts-a.pts||b.w-a.w);}

function dp(tn){const pl=gpp(S.pk.length,S.pl);db.ref("draft").set({players:S.pl,picks:[...S.pk,{pick:S.pk.length+1,player:pl,team:tn}]});}
function undo(){if(S.pk.length>0)db.ref("draft").set({players:S.pl,picks:S.pk.slice(0,-1)});}
function sres(t,ri,v){const a=[...(S.rs[t]||[])];a[ri]=v;if(v==="N")for(let i=ri+1;i<6;i++)a[i]=null;db.ref("results").set({...S.rs,[t]:a});}
function doreset(){if(S.rc!==ADMIN_CODE){ss({re:true});return;}db.ref("draft").set(null);db.ref("results").set(null);ss({ph:"setup",pl:[],pk:[],rs:{},mr:false,rc:"",re:false,sp:null,sf:null});}
function shuf(){
  const names=S.sn.split("\n").map(n=>n.trim()).filter(Boolean);if(names.length<2)return;
  ss({sg:true,sf:null});let c=0;
  const iv=setInterval(()=>{const s=[...names];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}
    ss({sf:[...s]});if(++c>=12){clearInterval(iv);ss({sg:false});}},80);
}
function startd(){if(S.sf&&S.sf.length>=2){db.ref("draft").set({players:S.sf,picks:[]});ss({sf:null});}}

function h(tag,at,...ch){
  const el=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of ch.flat()){if(c==null)continue;el.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return el;
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  // Header
  app.appendChild(h("header",null,h("div",{class:"rainbow"}),h("div",{class:"hdr"},
    h("div",null,h("div",{class:"sub"},"2026 NCAA Tournament"),h("h1",null,"SNAKE DRAFT TRACKER")),
    h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}},
      h("div",{class:"live"},h("div",{class:"ldot"}),"LIVE SYNC"),
      ...(S.ph==="draft"?[h("button",{class:"nb",onClick:()=>ss({ph:"tracker",vw:"standings"})},"TRACKER")]:[]),
      ...(S.ph==="tracker"?["standings","results","draft board"].map(v=>h("button",{class:"nb"+(S.vw===v?" act":""),onClick:()=>ss({vw:v,sp:null})},v.toUpperCase())):[]),
      ...(S.ph!=="setup"?[h("button",{class:"nb dng",onClick:()=>ss({mr:true,rc:"",re:false})},"RESET")]:[]))
  )));
  // Reset modal
  if(S.mr){
    const inp=h("input",{type:"password",placeholder:"Enter admin code...",style:{width:"100%",padding:"12px 16px",fontSize:"16px",textAlign:"center",letterSpacing:"3px",marginBottom:"8px",borderColor:S.re?"#e94560":"#333"}});
    inp.value=S.rc;inp.addEventListener("input",e=>{S.rc=e.target.value.toUpperCase();S.re=false;});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")doreset();});
    setTimeout(()=>inp.focus(),50);
    app.appendChild(h("div",{class:"mbg"},h("div",{class:"mdl"},
      h("h3",{style:{fontFamily:"'Bebas Neue'",fontSize:"28px",color:"#e94560",letterSpacing:"2px",marginBottom:"12px"}},"RESET EVERYTHING?"),
      h("p",{style:{fontFamily:"'Barlow'",fontSize:"14px",color:"#888",marginBottom:"16px"}},"Enter admin code to erase the draft for everyone."),
      inp,
      ...(S.re?[h("p",{style:{fontFamily:"'Barlow'",fontSize:"13px",color:"#e94560",margin:"0 0 12px"}},"Wrong code. Try again.")]:[]),
      h("div",{style:{display:"flex",gap:"12px",justifyContent:"center",marginTop:"12px"}},
        h("button",{class:"nb",style:{background:"#e94560",color:"#fff",padding:"10px 24px",borderColor:"#e94560"},onClick:doreset},"CONFIRM"),
        h("button",{class:"nb",style:{padding:"10px 24px"},onClick:()=>ss({mr:false,rc:"",re:false})},"CANCEL"))
    )));
  }
  const main=h("main",null);app.appendChild(main);

  // LOADING
  if(S.ph==="loading"){main.appendChild(h("div",{style:{textAlign:"center",paddingTop:"100px"}},
    h("div",{style:{color:"#e94560",fontFamily:"'Bebas Neue'",fontSize:"24px",letterSpacing:"3px"}},"CONNECTING..."),
    h("div",{style:{color:"#555",fontFamily:"'Barlow'",fontSize:"13px",marginTop:"8px"}},"Syncing with Firebase")));
  }

  // SETUP
  if(S.ph==="setup"){
    const w=h("div",{style:{maxWidth:"500px",margin:"0 auto"}});
    w.appendChild(h("h2",{style:{fontSize:"36px",letterSpacing:"3px",textAlign:"center",marginBottom:"8px"}},"DRAFT SETUP"));
    w.appendChild(h("p",{style:{fontFamily:"'Barlow'",fontSize:"14px",color:"#888",textAlign:"center",marginBottom:"24px"}},"Enter player names, one per line. Randomize the order, then start."));
    const ta=h("textarea",{rows:"10",placeholder:"One name per line...",style:{width:"100%",padding:"16px",fontSize:"16px",resize:"vertical"}});
    ta.value=S.sn;ta.addEventListener("input",e=>{S.sn=e.target.value;S.sf=null;render();});w.appendChild(ta);
    const nm=S.sn.split("\n").filter(n=>n.trim());
    w.appendChild(h("div",{style:{fontFamily:"'Barlow'",fontSize:"13px",color:"#555",margin:"8px 0 20px"}},`${nm.length} players · ${T.length} teams · ${Math.ceil(T.length/Math.max(1,nm.length))} rounds`));
    w.appendChild(h("button",{style:{width:"100%",padding:"14px",border:"2px solid #ffd166",cursor:"pointer",marginBottom:"12px",fontFamily:"'Bebas Neue'",fontSize:"22px",letterSpacing:"3px",background:S.sg?"#ffd16633":"transparent",color:"#ffd166",opacity:nm.length<2?"0.4":"1"},onClick:shuf},S.sg?"SHUFFLING...":"\uD83C\uDFB2  RANDOMIZE ORDER"));
    if(S.sf&&!S.sg){
      const bx=h("div",{style:{background:"rgba(255,215,102,0.04)",border:"1px solid #ffd16644",padding:"16px",marginBottom:"16px"}});
      bx.appendChild(h("div",{style:{fontFamily:"'Barlow Condensed'",fontSize:"12px",fontWeight:"700",color:"#ffd166",letterSpacing:"3px",marginBottom:"12px"}},"DRAFT ORDER"));
      S.sf.forEach((name,i)=>{const c=PP[i%PP.length];
        bx.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",marginBottom:"4px",background:c.b,border:`1px solid ${c.a}33`,animation:`fadeIn 0.3s ease-out ${i*0.05}s both`}},
          h("div",{style:{width:"28px",height:"28px",display:"flex",alignItems:"center",justifyContent:"center",background:i===0?"#e94560":"rgba(255,255,255,0.06)",fontFamily:"'Bebas Neue'",fontSize:"16px",color:"#fff",flexShrink:"0"}},String(i+1)),
          h("span",{style:{fontFamily:"'Barlow'",fontSize:"15px",fontWeight:"600",color:c.a}},name),
          ...(i===0?[h("span",{style:{marginLeft:"auto",fontFamily:"'Barlow'",fontSize:"10px",color:"#e94560",padding:"2px 8px",border:"1px solid #e9456044",letterSpacing:"1px"}},"1ST PICK")]:[])
        ));});
      bx.appendChild(h("div",{style:{fontFamily:"'Barlow'",fontSize:"12px",color:"#666",marginTop:"10px"}},"↩ Snake: order reverses each round"));
      w.appendChild(bx);
    }
    const ok=S.sf&&!S.sg;
    w.appendChild(h("button",{style:{width:"100%",padding:"14px",border:"none",cursor:"pointer",fontFamily:"'Bebas Neue'",fontSize:"22px",letterSpacing:"3px",background:ok?"#e94560":"#333",color:ok?"#fff":"#666"},onClick:startd},"START DRAFT"));
    if(!S.sf)w.appendChild(h("div",{style:{fontFamily:"'Barlow'",fontSize:"12px",color:"#555",textAlign:"center",marginTop:"8px"}},"Randomize first to unlock"));
    main.appendChild(w);
  }

  // DRAFT
  if(S.ph==="draft"){
    const dr=new Set(S.pk.map(p=>p.team)),otc=gpp(S.pk.length,S.pl),ci=S.pl.indexOf(otc),cc=PP[ci%PP.length];
    const av=T.filter(t=>!dr.has(t.name)),fl=av.filter(t=>(!S.sr||t.name.toLowerCase().includes(S.sr.toLowerCase()))&&(S.fr==="All"||t.region===S.fr)).sort((a,b)=>a.seed-b.seed);
    main.appendChild(h("div",{style:{background:`linear-gradient(135deg,${cc.b},#0a0a0f)`,border:`2px solid ${cc.a}`,padding:"20px 24px",marginBottom:"24px",textAlign:"center"}},
      h("div",{style:{fontFamily:"'Barlow Condensed'",fontSize:"13px",color:"#888",letterSpacing:"3px"}},`PICK #${S.pk.length+1} · ON THE CLOCK`),
      h("div",{style:{fontSize:"48px",letterSpacing:"4px",color:cc.a}},otc.toUpperCase()),
      h("div",{style:{fontFamily:"'Barlow'",fontSize:"13px",color:"#666",marginTop:"4px"}},`${av.length} left · Round ${Math.floor(S.pk.length/S.pl.length)+1}`)
    ));
    const ct=h("div",{style:{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}});
    const si=h("input",{type:"text",placeholder:"Search teams...",style:{flex:"1",minWidth:"180px",padding:"10px 14px",fontSize:"14px"}});
    si.value=S.sr;si.addEventListener("input",e=>{S.sr=e.target.value;render();});ct.appendChild(si);
    ["All","East","West","Midwest","South"].forEach(r=>{const a=S.fr===r;
      ct.appendChild(h("button",{class:"rb",style:{borderColor:a?(RC[r]||"#888"):"#333",background:a?(RC[r]||"#888")+"22":"transparent",color:a?(RC[r]||"#fff"):"#666"},onClick:()=>ss({fr:r})},r.toUpperCase()));});
    if(S.pk.length>0)ct.appendChild(h("button",{class:"nb dng",onClick:undo},"UNDO"));
    main.appendChild(ct);
    const gr=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"6px"}});
    fl.forEach(t=>{gr.appendChild(h("button",{class:"tb",style:{borderColor:RC[t.region]+"33"},onClick:()=>dp(t.name)},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span",{style:{fontFamily:"'Barlow Condensed'",fontSize:"15px",fontWeight:"700",color:"#e8e6e3"}},t.name),
        h("span",{style:{fontFamily:"'Bebas Neue'",fontSize:"18px",color:RC[t.region],opacity:"0.7"}},String(t.seed))),
      h("div",{style:{fontFamily:"'Barlow'",fontSize:"11px",color:RC[t.region],marginTop:"4px",opacity:"0.8"}},t.region)));});
    main.appendChild(gr);
    if(S.pk.length>0){
      main.appendChild(h("h3",{style:{fontSize:"20px",letterSpacing:"2px",color:"#888",margin:"24px 0 12px"}},"RECENT PICKS"));
      const rp=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
      S.pk.slice(-12).reverse().forEach(p=>{const pc=PP[S.pl.indexOf(p.player)%PP.length],ti=T.find(t=>t.name===p.team);
        rp.appendChild(h("div",{style:{padding:"6px 12px",background:pc.b,border:`1px solid ${pc.a}33`,fontFamily:"'Barlow'",fontSize:"12px"}},
          h("span",{style:{color:"#666"}},`#${p.pick} `),h("span",{style:{color:pc.a,fontWeight:"600"}},p.player+" "),
          h("span",{style:{color:"#aaa"}},p.team),
          ...(ti?[h("span",{style:{color:RC[ti.region],marginLeft:"4px",opacity:"0.6"}},`(${ti.seed})`)]:[])
        ));});
      main.appendChild(rp);
    }
  }

  // STANDINGS
  if(S.ph==="tracker"&&S.vw==="standings"&&!S.sp){
    const st=gst(),gr=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:"12px",marginBottom:"24px"}});
    st.forEach((p,i)=>{
      gr.appendChild(h("div",{class:"pc",style:{background:`linear-gradient(135deg,${p.c.b},#0a0a0f)`,border:`1px solid ${p.c.a}33`},onClick:()=>ss({sp:p.nm})},
        h("div",{style:{position:"absolute",top:"0",left:"0",width:"32px",height:"32px",background:i===0?"#e94560":i===1?"#888":i===2?"#cd7f32":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue'",fontSize:"18px",color:"#fff"}},String(i+1)),
        h("div",{style:{padding:"16px 16px 12px"}},

            h("div",{style:{fontSize:"28px",color:p.c.a,letterSpacing:"2px"}},p.nm.toUpperCase()),
